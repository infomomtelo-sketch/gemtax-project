<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemtaxes | 2026 AI Tax Pilot</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="sticky top-0 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="font-bold text-2xl text-indigo-600">Gemtaxes.com</div>
        <div class="flex gap-4 items-center">
            <span class="text-sm font-medium">Refund: <span id="refund-val" class="text-green-600 font-bold">$0.00</span></span>
            <select id="lang-select" class="bg-slate-100 rounded px-2 py-1 text-sm border-none">
                <option value="en">English</option>
                <option value="pa">ਪੰਜਾਬੀ</option>
            </select>
        </div>
    </nav>

    <main class="flex h-[calc(100vh-73px)]">
        <section class="w-full md:w-1/2 p-10 overflow-y-auto">
            <h1 id="headline" class="text-4xl font-black mb-4">Maximize your 2026 Refund.</h1>
            <p class="text-slate-500 mb-8 italic">"I worked 200 hours of overtime and bought a new Ford truck."</p>
            
            <textarea id="user-input" class="w-full h-40 p-4 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-inner" placeholder="Type your 2025 work story here..."></textarea>
            
            <button onclick="analyzeTax()" class="mt-4 w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg transition-transform active:scale-95">
                Calculate Savings
            </button>
        </section>

        <section id="form-cabinet" class="hidden md:block w-1/2 bg-white border-l p-10 opacity-30 grayscale blur-[1px] transition-all duration-1000">
            <div class="border-2 border-slate-800 p-6 rounded shadow-lg max-w-md mx-auto">
                <div class="border-b-4 border-black font-bold text-xl mb-4">Form 1040 (2025)</div>
                <div class="space-y-6">
                    <div><span class="text-xs font-bold">Line 1z (Total Income):</span> <div id="form-income" class="border-b border-black h-6"></div></div>
                    <div><span class="text-xs font-bold">Line 13 (OBBB Act Deductions):</span> <div id="form-deduct" class="border-b border-black h-6 text-indigo-600 font-bold"></div></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        async function analyzeTax() {
            const btn = document.querySelector('button');
            btn.innerText = "Analyzing...";
            
            const response = await fetch('/api/scan', {
                method: 'POST',
                body: JSON.stringify({ 
                    text: document.getElementById('user-input').value,
                    lang: document.getElementById('lang-select').value 
                })
            });
            const result = await response.json();

            // UI Animations
            document.getElementById('refund-val').innerText = `$${result.refund}`;
            document.getElementById('form-income').innerText = `$${result.income}`;
            document.getElementById('form-deduct').innerText = `$${result.deductions}`;
            
            const cabinet = document.getElementById('form-cabinet');
            cabinet.classList.remove('opacity-30', 'grayscale', 'blur-[1px]');
            btn.innerText = "Calculated!";
        }
    </script>
</body>
</html>
