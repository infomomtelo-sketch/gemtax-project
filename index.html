<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemtax | 1099 Sidekick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="p-6 bg-white border-b border-slate-200">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">Gemtax <span class="text-slate-400 font-light">2026</span></h1>
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">API Live</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 grid md:grid-cols-2 gap-8 mt-10">
        <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold mb-6 text-slate-800">Estimate Income</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">W2 Wages</label>
                    <input type="number" id="w2" value="50000" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">1099 Profit</label>
                    <input type="number" id="1099" value="25000" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <button onclick="calculate()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition">
                    Update Calculation
                </button>
            </div>
        </section>

        <div id="pdf-content">
            <section class="bg-indigo-900 text-white p-8 rounded-2xl shadow-xl h-full flex flex-col">
                <div class="mb-8">
                    <p class="text-indigo-300 uppercase tracking-widest text-[10px] font-bold mb-1">Estimated 2026 Total Tax</p>
                    <div id="totalTax" class="text-5xl font-extrabold">$0</div>
                </div>
                
                <div class="space-y-5 border-t border-indigo-800 pt-6 flex-grow">
                    <div class="flex justify-between">
                        <span class="text-indigo-300 text-sm">Self-Employment Tax</span>
                        <span id="seTax" class="font-bold">$0</span>
                    </div>
                    <div class="flex justify-between border-b border-indigo-800 pb-4">
                        <span class="text-indigo-300 text-sm">Federal Income Tax</span>
                        <span id="fedTax" class="font-bold">$0</span>
                    </div>
                    <div class="bg-indigo-800/40 p-5 rounded-xl">
                        <div class="flex justify-between items-center">
                            <span class="text-xs uppercase font-bold text-indigo-300 tracking-wider">Take-Home Pay</span>
                            <span id="takeHome" class="text-2xl font-black text-green-400">$0</span>
                        </div>
                    </div>
                </div>

                <button onclick="downloadPDF()" class="mt-8 flex items-center justify-center gap-2 w-full bg-white/10 border border-white/20 text-white py-3 rounded-xl hover:bg-white/20 transition text-sm font-semibold">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12 a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download PDF Estimate
                </button>
            </section>
        </div>
    </main>

    <script>
        async function calculate() {
            const w2 = parseFloat(document.getElementById('w2').value) || 0;
            const n1099 = parseFloat(document.getElementById('1099').value) || 0;
            
            const response = await fetch('https://gemtax-project.infomomtelo.workers.dev/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ w2Income: w2, net1099Income: n1099, filingStatus: 'single' })
            });
            
            const data = await response.json();
            
            const total = data.summary.selfEmploymentTax + data.summary.federalIncomeTax;
            const takeHome = (w2 + n1099) - total;

            document.getElementById('totalTax').innerText = '$' + total.toLocaleString();
            document.getElementById('seTax').innerText = '$' + data.summary.selfEmploymentTax.toLocaleString();
            document.getElementById('fedTax').innerText = '$' + data.summary.federalIncomeTax.toLocaleString();
            document.getElementById('takeHome').innerText = '$' + takeHome.toLocaleString();
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: 0.5,
                filename: 'Gemtax-2026-Estimate.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        calculate();
    </script>
</body>
</html>
