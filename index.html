<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemtaxes | 2026 AI Tax Pilot</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="sticky top-0 bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="font-bold text-2xl text-indigo-600">Gemtaxes.com</div>
        <div class="flex gap-4 items-center">
            <span class="text-sm font-medium">Refund: <span id="refund-val" class="text-green-600 font-bold">$0.00</span></span>
            <select id="lang-select" class="bg-slate-100 rounded px-2 py-1 text-sm border-none">
                <option value="en">English</option>
                <option value="pa">ਪੰਜਾਬੀ</option>
            </select>
        </div>
    </nav>

    <main class="flex h-[calc(100vh-73px)]">
        <section class="w-full md:w-1/2 p-10 overflow-y-auto">
            <h1 id="headline" class="text-4xl font-black mb-4">Maximize your 2026 Refund.</h1>
            <p class="text-slate-500 mb-8 italic">"I worked 200 hours of overtime and bought a new Ford truck."</p>
            
            <textarea id="user-input" class="w-full h-40 p-4 rounded-2xl border-2 border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-inner" placeholder="Type your 2025 work story here..."></textarea>
            
            <button onclick="analyzeTax()" class="mt-4 w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 shadow-lg transition-transform active:scale-95">
                Calculate Savings
            </button>
        </section>

        <section id="form-cabinet" class="hidden md:block w-1/2 bg-white border-l p-10 opacity-30 grayscale blur-[1px] transition-all duration-1000">
            <div class="border-2 border-slate-200 p-6 rounded shadow-inner">
    <p class="font-bold">Form 1040 (2025)</p>
    <hr class="my-2">
    <p class="text-sm text-slate-500">Line 1z (Total Income):</p>
    <div id="form-income" class="font-mono text-lg">$0</div>
    
    <p class="text-sm text-slate-500 mt-4">Line 13 (OBBB Act Deductions):</p>
    <div id="form-deduction" class="font-mono text-lg text-blue-600">$0</div>
</div>
            </div>
        </section>
    </main>

    <script>
        async function analyzeTax() {
    const btn = document.querySelector('button');
    const userInput = document.getElementById('user-input').value; // Match HTML id
    const lang = document.getElementById('lang-select').value;
    
    // UI Feedback
    btn.innerText = "Analyzing...";
    btn.disabled = true; // Prevent double-clicks

    try {
        const response = await fetch('/api/scan', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                text: userInput, 
                lang: lang,
                user_guid: localStorage.getItem('gemtax_guid') || 'guest_' + Math.random()
            })
        });

        if (!response.ok) throw new Error('API Error');

        const result = await response.json();

        // Match these IDs exactly to your HTML
        document.getElementById('form-income').innerText = `$${result.income.toLocaleString()}`;
        document.getElementById('form-deduction').innerText = `-$${result.deductions.toLocaleString()}`;
        document.getElementById('refund-val').innerText = `$${result.refund.toLocaleString()}`;

        // Reveal the form
        const cabinet = document.getElementById('form-cabinet');
        cabinet.classList.remove('opacity-30', 'grayscale', 'blur-[1px]');
        
        btn.innerText = "Calculated!";
    } catch (e) {
        console.error("Gemtax Error:", e);
        btn.innerText = "Try Again";
    } finally {
        btn.disabled = false;
    }
}
        
    </script>
</body>
</html>
